name: Build & Push Docker Images (GHCR)

on:
  push:
    branches: [ master, main ]
    paths:
      - 'docker/**'
      - 'ma-min-app/**'
      - '.github/workflows/build-images.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  OWNER: ravindrabajpai            # your GitHub username (lowercase)
  REPO: ma-min-app                 # repo name (lowercase)
  IMAGE_PREFIX: ma-min-app         # base image name

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        component:
          - name: api
            dockerfile: docker/api.Dockerfile
            context: .
            port: "8000"
          - name: ui
            dockerfile: docker/ui.Dockerfile
            context: .
            port: "8501"
          - name: worker
            dockerfile: docker/worker.Dockerfile
            context: .
            port: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tags
        id: meta
        run: |
          SHA_TAG=${GITHUB_SHA::7}
          echo "sha_tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          # optionally parse version from pyproject if you want semver tags

      - name: Build & Push ${{ matrix.component.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          file: ${{ matrix.component.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component.name }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component.name }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component.name }}:buildcache,mode=max

